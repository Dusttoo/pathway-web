name: CI

# Runs the quality gates on every push and pull request so problems are caught
# automatically before they reach the main branch. All commands run inside the
# Next.js app, which lives in the `frontend/` folder.

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Type-check, lint, and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc)
        run: npm run type-check

      - name: Lint (eslint)
        run: npm run lint

      - name: Test (vitest)
        run: npm test
